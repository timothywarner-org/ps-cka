# Globomantics parts shop -- nginx config.
#
# Listens on 8080, not 80. WHY: ports below 1024 are privileged, so binding 80
# would force the container to run as root. Listening high lets us run as an
# unprivileged user, which is what the securityContext in the Deployment asks for.
# This is the same reason real production images almost never listen on 80.

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;

    # Everything nginx needs to write goes to /tmp, because the container's
    # root filesystem is mounted READ-ONLY (readOnlyRootFilesystem: true).
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # A dedicated liveness/readiness target. Probing "/" works, but it drags
        # the whole page through the probe. /healthz returns 200 and nothing else,
        # which is what a probe actually wants.
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
