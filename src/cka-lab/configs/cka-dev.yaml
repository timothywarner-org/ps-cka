# KIND "dev" cluster for context-management practice
# 1 control-plane + 1 worker (lightweight)
#
# Paired with cka-prod.yaml. Host port mappings are unique per cluster
# (dev: 30100/30180, prod: 30200/30280) so both clusters can coexist.
#
# Created by kind-multi-up.ps1 -- name set via --name flag (cka-dev).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30100
        hostPort: 30100
        protocol: TCP
      - containerPort: 30180
        hostPort: 30180
        protocol: TCP
  - role: worker
